name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Run Tests
        run: go test ./...

      - name: Build Docker Image
        run: docker build -t starttech-backend .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag starttech-backend ${{ secrets.DOCKER_USERNAME }}/starttech-backend:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/starttech-backend:latest